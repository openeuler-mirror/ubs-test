apiVersion: v1
kind: Pod
metadata:
  name: pod-for-mem
  namespace: kube-system
  labels:
    remote-mem-allocation-ratio: "25"
spec:
  nodeName: worker1
  # pod创建到的节点名，只有到对应节点才能看到加压进程和相关日志
  containers:
  - name: numa
    image: docker.io/library/numa-stress:v1.0
    command: ["/bin/sh", "-c", "while true; do sleep 1000; done"]
    env:
      - name: LD_LIBRARY_PATH
        value: "/usr/local/softbus/ctrlbus/lib:/lib:/lib64:/usr/lib64:/usr/hostlib"
    volumeMounts:
      - name: libpath
        mountPath: /usr/hostlib
    resources:
      requests:
        cpu: "2"
        memory: "8Gi"
      limits:
        cpu: "2"
        memory: "8Gi"
    securityContext:
      # 开启特权模式，以防止由于 /dev/pts 权限问题导致 exec 报错
      privileged: true
      allowPrivilegeEscalation: true
      capabilities:
        add:
          - SYS_ADMIN
  volumes:
  - name: libpath
    hostPath:
      path: /usr/lib64/
